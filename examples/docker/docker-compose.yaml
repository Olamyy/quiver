# Docker Compose setup for Quiver development and testing
# Provides PostgreSQL and Redis instances for example configurations


services:
  # PostgreSQL for feature storage
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: quiver_user
      POSTGRES_PASSWORD: quiver_dev_password
      POSTGRES_DB: quiver_features
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiver_user -d quiver_features"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for real-time features  
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass quiver_dev_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "quiver_dev_redis_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis without password for simple testing
  redis-simple:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_simple_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: "local:redis:6379:1:quiver_dev_redis_password,simple:redis-simple:6379"
    ports:
      - "8081:8081"
    depends_on:
      - redis
      - redis-simple
    profiles:
      - admin

volumes:
  postgres_data:
  redis_data:
  redis_simple_data: