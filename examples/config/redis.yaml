# Example configuration for Redis-based feature serving  
# Optimized for real-time, low-latency ML inference with current-only features

server:
  host: "0.0.0.0" 
  port: 8815

  # TLS disabled for development
#  tls:
#     cert_path: "/etc/ssl/certs/quiver.pem"
#     key_path: "/etc/ssl/private/quiver.key"
  
  # High-performance settings for real-time inference
  max_concurrent_rpcs: 5000
  max_message_size_mb: 32
  timeout_seconds: 10  # Fast timeout for real-time systems
  compression: gzip
  
  access_log:
    enabled: true
    format: "json"
    include_request_body: false
    include_response_metadata: true

registry:
  type: static
  views:
    - name: "realtime_features"
      entity_type: "user"
      entity_key: "user_id"
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "redis_cache"
        
        - name: "current_session_score"
          arrow_type: "float64"
          nullable: true
          source: "redis_cache"
        
        - name: "last_action_timestamp"
          arrow_type: "timestamp"
          nullable: true
          source: "redis_cache"
        
        - name: "is_online"
          arrow_type: "bool"
          nullable: true
          source: "redis_cache"
    
    - name: "recommendation_features"
      entity_type: "user"
      entity_key: "user_id" 
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "redis_recommendations"
        
        - name: "trending_category"
          arrow_type: "string"
          nullable: true
          source: "redis_recommendations"
        
        - name: "recommendation_score"
          arrow_type: "float64"
          nullable: true
          source: "redis_recommendations"

# Redis adapters for different data types
adapters:
  redis_cache:
    type: redis
    connection: "redis://:quiver_dev_redis_password@127.0.0.1:6379"
    # QUIVER__ADAPTERS__REDIS_CACHE__PASSWORD="your_redis_password"
    key_template: "features:user:{entity}:feature:{feature}"
    # TLS configuration (uncomment for production with TLS-enabled Redis)
    # tls:
    #   verify_certificates: true
    #   ca_cert_path: "/etc/ssl/redis-ca.pem"
    #   client_cert_path: "/etc/ssl/redis-client.pem"
    #   client_key_path: "/etc/ssl/redis-client.key"
  
  redis_recommendations:
    type: redis
    connection: "redis://127.0.0.1:6379"
    # Custom key template for recommendation data
    key_template: "ml:recommendations:{entity}:{feature}"
    # Example: TLS without certificate verification (for testing)
    # tls:
    #   verify_certificates: false