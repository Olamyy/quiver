server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 30

registry:
  type: static
  views:
    - name: ecommerce_features
      entity_type: user
      entity_key: user_id
      columns:
        - name: spend_30d
          arrow_type: float64
          source: s3_adapter
        - name: purchase_count
          arrow_type: int64
          source: s3_adapter
        - name: last_purchase_date
          arrow_type: timestamp
          source: s3_adapter
        - name: is_premium
          arrow_type: bool
          source: s3_adapter

adapters:
  s3_adapter:
    type: s3_parquet
    storage_uri: "s3://${AWS_BUCKET}/features"
    source_path: "{feature}.parquet"
    timeout_seconds: 30
    auth:
      region: "${AWS_REGION}"
      access_key_id: "${AWS_ACCESS_KEY_ID}"
      secret_access_key: "${AWS_SECRET_ACCESS_KEY}"

# Set AWS credentials environment variables before running:
#   export AWS_BUCKET=my-bucket
#   export AWS_REGION=us-west-2
#   export AWS_ACCESS_KEY_ID=your_key
#   export AWS_SECRET_ACCESS_KEY=your_secret
#   quiver serve --config examples/config/s3/with-credentials.yaml
