server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 30

registry:
  type: static
  views:
    - name: ecommerce_features
      entity_type: user
      entity_key: user_id
      columns:
        - name: spend_30d
          arrow_type: float64
          source: postgres_adapter
        - name: purchase_count
          arrow_type: int64
          source: postgres_adapter
        - name: last_purchase_date
          arrow_type: timestamp
          source: postgres_adapter
        - name: is_premium
          arrow_type: bool
          source: postgres_adapter

adapters:
  postgres_adapter:
    type: postgres
    connection_string: "postgresql://quiver:quiver_test@localhost:5432/quiver_test"
    source_path: "ecommerce_data"
    max_connections: 10
    timeout_seconds: 30
