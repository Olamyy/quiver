server:
  host: 127.0.0.1
  port: 8815
  timeout_seconds: 30

  # Performance-optimized: observability disabled for maximum throughput
  # Eliminates metrics collection overhead (~3-7 µs per request)
  # Request IDs are not generated and metrics service is not started
  observability:
    enabled: false

  validation:
    skip_all_validation: false
    request_validations:
      - entity_ids_not_empty
      - feature_names_not_empty
    response_validations:
      - schema_consistency

registry:
  type: static
  views:
    - name: ecommerce_features
      entity_type: user
      entity_key: user_id
      columns:
        - name: spend_30d
          arrow_type: float64
          source: memory_adapter
        - name: purchase_count
          arrow_type: int64
          source: memory_adapter
        - name: last_purchase_date
          arrow_type: timestamp
          source: memory_adapter
        - name: is_premium
          arrow_type: bool
          source: memory_adapter

adapters:
  memory_adapter:
    type: memory
