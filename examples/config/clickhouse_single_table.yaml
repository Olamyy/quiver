# ClickHouse adapter - single table with structured paths
#
# This configuration demonstrates using structured source paths:
# - All features in one table (all_user_features)
# - Each column can be explicitly mapped
# - Useful when features are already normalized in a single wide table
# - Better for real-time updates and transactional consistency

server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 30

registry:
  type: static
  views:
    - name: user_demographics
      entity_type: user
      entity_key: user_id
      source_path:
        table: "all_user_features"
      columns:
        - name: age
          arrow_type: int64
          source: clickhouse_single
          source_path:
            table: "all_user_features"
            column: "age"
        - name: country
          arrow_type: string
          source: clickhouse_single
          source_path:
            table: "all_user_features"
            column: "country"
        - name: premium_user
          arrow_type: boolean
          source: clickhouse_single
          source_path:
            table: "all_user_features"
            column: "is_premium"

adapters:
  clickhouse_single:
    type: clickhouse
    connection_string: "clickhouse://localhost:9000/feature_store"
    source_path:
      table: "all_user_features"
    max_connections: 30
    timeout_seconds: 30
