# Example hybrid configuration using multiple adapter types
# Best of both worlds: Redis for real-time features, PostgreSQL for historical data

server:
  host: "0.0.0.0"
  port: 8815
  
  # Production-ready settings
  tls:
    cert_path: "/etc/ssl/certs/quiver.pem" 
    key_path: "/etc/ssl/private/quiver.key"
  
  max_concurrent_rpcs: 3000
  max_message_size_mb: 96
  timeout_seconds: 45
  compression: gzip
  
  access_log:
    enabled: true
    format: "json"
    include_request_body: false
    include_response_metadata: true

registry:
  type: static
  views:
    - name: "ml_inference_features"
      entity_type: "user"
      entity_key: "user_id"
      schema_version: 1
      columns:
        # Entity ID (required)
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "memory"  # Always available
        
        # Real-time features from Redis
        - name: "current_session_duration"
          arrow_type: "float64"
          nullable: true
          source: "redis_realtime"
        
        - name: "recent_clicks"
          arrow_type: "int64"
          nullable: true
          source: "redis_realtime"
        
        - name: "is_authenticated"
          arrow_type: "boolean"
          nullable: true
          source: "redis_realtime"
        
        # Historical features from PostgreSQL
        - name: "lifetime_value"
          arrow_type: "float64"
          nullable: true
          source: "postgres_warehouse"
        
        - name: "avg_monthly_spend"
          arrow_type: "float64"
          nullable: true
          source: "postgres_warehouse"
        
        - name: "days_since_registration"
          arrow_type: "int64"
          nullable: true
          source: "postgres_warehouse"
        
        - name: "preferred_category"
          arrow_type: "string"
          nullable: true
          source: "postgres_warehouse"
    
    - name: "recommendation_context"
      entity_type: "item"
      entity_key: "item_id"
      columns:
        - name: "item_id"
          arrow_type: "string"
          nullable: false
          source: "memory"
        
        # Fast item features from Redis
        - name: "current_popularity_score"
          arrow_type: "float64"
          nullable: true
          source: "redis_items"
        
        - name: "inventory_count"
          arrow_type: "int64"
          nullable: true
          source: "redis_items"
        
        # Rich item features from PostgreSQL
        - name: "category"
          arrow_type: "string"
          nullable: false
          source: "postgres_catalog"
        
        - name: "price"
          arrow_type: "float64"
          nullable: false
          source: "postgres_catalog"
        
        - name: "rating_average"
          arrow_type: "float64"
          nullable: true
          source: "postgres_catalog"

# Multi-adapter configuration
adapters:
  # In-memory for fast entity ID handling
  memory:
    type: memory
  
  # Redis for real-time, frequently updated features
  redis_realtime:
    type: redis
    connection: "rediss://realtime.cache.internal:6380"
    key_template: "rt:user:{entity}:{feature}"
    # Password via environment: QUIVER__ADAPTERS__REDIS_REALTIME__PASSWORD
  
  redis_items:
    type: redis
    connection: "rediss://items.cache.internal:6380"
    key_template: "items:{entity}:{feature}"
  
  # PostgreSQL for analytical and historical features
  postgres_warehouse:
    type: postgres
    connection_string: "postgresql://ml_reader@warehouse.internal:5432/ml_features?sslmode=require&application_name=quiver"
    table_template: "user_features_{feature}"
    max_connections: 25
    timeout_seconds: 60
  
  postgres_catalog:
    type: postgres  
    connection_string: "postgresql://catalog_reader@catalog.internal:5432/product_db?sslmode=require"
    table_template: "product_{feature}_view"
    max_connections: 15
    timeout_seconds: 30