server:
  host: 127.0.0.1
  port: 8815
  timeout_seconds: 30
  access_log:
    enabled: true
    format: json

registry:
  type: static
  views:
    - name: ecommerce_features
      entity_type: user
      entity_key: entity
      columns:
        - name: spend_30d
          arrow_type: float64
          source: postgres_ecommerce
        - name: purchase_count
          arrow_type: int64
          source: postgres_ecommerce

adapters:
  postgres_ecommerce:
    type: postgres
    connection_string: "postgresql://quiver:quiver_test@localhost:5432/quiver_test"
    source_path: "ecommerce_data"
    max_connections: 10
    timeout_seconds: 20
