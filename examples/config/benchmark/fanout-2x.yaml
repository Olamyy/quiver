server:
  host: 127.0.0.1
  port: 8815
  timeout_seconds: 30
  access_log:
    enabled: true
    format: json
  fanout:
    enabled: true
    max_concurrent_backends: 10
    partial_failure_strategy: null_fill
    downtime_strategy: "return_available"

registry:
  type: static
  views:
    - name: hybrid_features
      entity_type: user
      entity_key: entity
      columns:
        - name: active_user_id
          arrow_type: string
          source: redis_sessions
        - name: request_count
          arrow_type: int64
          source: redis_sessions
        - name: spend_30d
          arrow_type: float64
          source: postgres_ecommerce
        - name: purchase_count
          arrow_type: int64
          source: postgres_ecommerce

adapters:
  redis_sessions:
    type: redis
    connection: "redis://localhost:6379/0"
    source_path: "{entity}"
    parameters:
      mget_chunk_size: 1000
    timeout_seconds: 10

  postgres_ecommerce:
    type: postgres
    connection_string: "postgresql://quiver:quiver_test@localhost:5432/quiver_test"
    source_path: "ecommerce_data"
    max_connections: 10
    timeout_seconds: 20
