# Example configuration for in-memory feature serving
# Perfect for development, testing, and high-performance caching scenarios

server:
  host: "0.0.0.0"
  port: 8815
  # Optional TLS configuration
  # tls:
  #   cert_path: "/path/to/cert.pem"
  #   key_path: "/path/to/key.pem"
  
  # Performance tuning
  max_concurrent_rpcs: 1000
  max_message_size_mb: 64
  timeout_seconds: 30
  
  # Access logging
  access_log:
    enabled: true
    format: "json"
    include_request_body: false
    include_response_metadata: true

# Static registry with feature views
registry:
  type: static
  views:
    - name: "user_features"
      entity_type: "user"
      entity_key: "user_id"
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "memory"
        
        - name: "age"
          arrow_type: "int64"
          nullable: true
          source: "memory"
        
        - name: "score"
          arrow_type: "float64"
          nullable: true
          source: "memory"
        
        - name: "is_premium"
          arrow_type: "bool"
          nullable: true
          source: "memory"

# Adapter configuration
adapters:
  memory:
    type: memory