# Example configuration for PostgreSQL-based feature serving
# Ideal for production deployments with persistent feature storage and temporal queries

server:
  host: "0.0.0.0"
  port: 8815
  
  # TLS disabled for development
  # tls:
  #   cert_path: "/etc/ssl/certs/quiver.pem"
  #   key_path: "/etc/ssl/private/quiver.key"
  
  # Production performance settings
  max_concurrent_rpcs: 2000
  max_message_size_mb: 128
  timeout_seconds: 60
  compression: gzip
  
  access_log:
    enabled: false
    format: "json"
    include_request_body: false
    include_response_metadata: true

registry:
  type: static
  views:
    - name: "user_demographics"
      entity_type: "user" 
      entity_key: "user_id"
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "postgres_main"
        
        - name: "age"
          arrow_type: "int64"
          nullable: true
          source: "postgres_main"
        
        - name: "country"
          arrow_type: "string"
          nullable: true
          source: "postgres_main"
        
        - name: "registration_date"
          arrow_type: "timestamp"
          nullable: false
          source: "postgres_main"
    
    - name: "user_scores"
      entity_type: "user"
      entity_key: "user_id"
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "postgres_analytics"
        
        - name: "credit_score"
          arrow_type: "float64"
          nullable: true
          source: "postgres_analytics"
        
        - name: "engagement_score"
          arrow_type: "float64"
          nullable: true
          source: "postgres_analytics"
        
        - name: "last_updated"
          arrow_type: "timestamp"
          nullable: false
          source: "postgres_analytics"

# Multiple PostgreSQL adapters for different data sources
adapters:
  postgres_main:
    type: postgres
    # Connection without SSL parameters - TLS controlled via tls section
    connection_string: "postgresql://quiver_user:quiver_dev_password@127.0.0.1:5432/quiver_features"
    table_template: "user_features_{feature}"
    max_connections: 20
    timeout_seconds: 30
    # TLS configuration (uncomment for production)
    # tls:
    #   verify_certificates: true
    #   ca_cert_path: "/etc/ssl/postgres-ca.pem"
    #   client_cert_path: "/etc/ssl/postgres-client.pem"
    #   client_key_path: "/etc/ssl/postgres-client.key"

  postgres_analytics:
    type: postgres
    # Change this from analytics-db.example.com to 127.0.0.1
    connection_string: "postgresql://quiver_user:quiver_dev_password@127.0.0.1:5432/quiver_features"
    table_template: "user_features_{feature}"
    max_connections: 15
    timeout_seconds: 45
    # Example: TLS without certificate verification (for development)
    # tls:
    #   verify_certificates: false