server:
  host: "0.0.0.0"
  port: 8815
  max_concurrent_rpcs: 1000
  max_message_size_mb: 128
  timeout_seconds: 30
  compression: gzip

  access_log:
    enabled: true
    format: "json"
    include_request_body: false
    include_response_metadata: true

registry:
  type: static
  views:
    - name: "daily_user_features"
      entity_type: "user"
      entity_key: "user_id"
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "s3_parquet_adapter"

        - name: "daily_active_users"
          arrow_type: "int64"
          nullable: true
          source: "s3_parquet_adapter"

        - name: "session_count"
          arrow_type: "int64"
          nullable: true
          source: "s3_parquet_adapter"

        - name: "avg_session_duration"
          arrow_type: "float64"
          nullable: true
          source: "s3_parquet_adapter"

        - name: "date"
          arrow_type: "string"
          nullable: false
          source: "s3_parquet_adapter"

adapters:
  s3_parquet_adapter:
    type: s3parquet
    storage_uri: "s3://feature-data-prod"
    source_path: "/year={year}/month={month}/day={day}/user_daily_features.parquet"
    timeout_seconds: 60
    max_days_back: 90
