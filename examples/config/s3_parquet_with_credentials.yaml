server:
  host: "0.0.0.0"
  port: 8815
  max_concurrent_rpcs: 1000
  max_message_size_mb: 128
  timeout_seconds: 30
  compression: gzip

  access_log:
    enabled: true
    format: "json"
    include_request_body: false
    include_response_metadata: true

registry:
  type: static
  views:
    - name: "product_features"
      entity_type: "product"
      entity_key: "product_id"
      columns:
        - name: "product_id"
          arrow_type: "string"
          nullable: false
          source: "s3_parquet_adapter"

        - name: "product_name"
          arrow_type: "string"
          nullable: false
          source: "s3_parquet_adapter"

        - name: "price"
          arrow_type: "float64"
          nullable: false
          source: "s3_parquet_adapter"

        - name: "inventory_count"
          arrow_type: "int64"
          nullable: false
          source: "s3_parquet_adapter"

        - name: "last_restocked"
          arrow_type: "timestamp"
          nullable: true
          source: "s3_parquet_adapter"

        - name: "is_available"
          arrow_type: "bool"
          nullable: false
          source: "s3_parquet_adapter"

adapters:
  s3_parquet_adapter:
    type: s3parquet
    storage_uri: "s3://private-feature-bucket"
    source_path: "/products/{feature}.parquet"
    auth: aws_auth
    timeout_seconds: 45
    max_days_back: 365
