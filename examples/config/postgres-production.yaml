# Example configuration for PostgreSQL-based feature serving
# Ideal for production deployments with persistent feature storage and temporal queries

server:
  host: "0.0.0.0"
  port: 8815
  
  # Production TLS configuration (recommended)
  tls:
    cert_path: "/etc/ssl/certs/quiver.pem"
    key_path: "/etc/ssl/private/quiver.key"
  
  # Production performance settings
  max_concurrent_rpcs: 2000
  max_message_size_mb: 128
  timeout_seconds: 60
  compression: gzip
  
  access_log:
    enabled: true
    format: "json"
    include_request_body: false
    include_response_metadata: true

registry:
  type: static
  views:
    - name: "user_demographics"
      entity_type: "user" 
      entity_key: "user_id"
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "postgres_main"
        
        - name: "age"
          arrow_type: "int64"
          nullable: true
          source: "postgres_main"
        
        - name: "country"
          arrow_type: "string"
          nullable: true
          source: "postgres_main"
        
        - name: "registration_date"
          arrow_type: "timestamp"
          nullable: false
          source: "postgres_main"
    
    - name: "user_scores"
      entity_type: "user"
      entity_key: "user_id"
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "postgres_analytics"
        
        - name: "credit_score"
          arrow_type: "float64"
          nullable: true
          source: "postgres_analytics"
        
        - name: "engagement_score"
          arrow_type: "float64"
          nullable: true
          source: "postgres_analytics"
        
        - name: "last_updated"
          arrow_type: "timestamp"
          nullable: false
          source: "postgres_analytics"

# Multiple PostgreSQL adapters for different data sources
adapters:
  postgres_main:
    type: postgres
    # Secure connection string - use environment variable for password
    # QUIVER__ADAPTERS__POSTGRES_MAIN__CONNECTION_STRING="postgresql://user:password@db.example.com:5432/features?sslmode=require"
    connection_string: "postgresql://quiver_user@localhost:5432/user_features?sslmode=require"
    table_template: "user_features_{feature}"
    max_connections: 20
    timeout_seconds: 30
  
  postgres_analytics:
    type: postgres
    # Alternative connection for analytics database
    connection_string: "postgresql://analytics_user@analytics-db.example.com:5432/ml_features?sslmode=require"
    table_template: "analytics_{feature}"  
    max_connections: 15
    timeout_seconds: 45