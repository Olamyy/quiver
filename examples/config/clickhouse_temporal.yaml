# ClickHouse adapter - temporal (time-travel) queries
#
# This configuration demonstrates ClickHouse with temporal support:
# - Each table has a feature_ts column for point-in-time queries
# - Supports as_of parameter for historical feature retrieval
# - Uses ROW_NUMBER() OVER for latest value selection
# - Useful for backtesting and audit trails

server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 60  # Temporal queries may be slower

registry:
  type: static
  views:
    - name: user_features_temporal
      entity_type: user
      entity_key: user_id
      columns:
        - name: spend_30d
          arrow_type: float64
          source: clickhouse_temporal
        - name: signup_date
          arrow_type: timestamp
          source: clickhouse_temporal

adapters:
  clickhouse_temporal:
    type: clickhouse
    connection_string: "clickhouse://localhost:9000/feature_store"
    source_path: "features_{feature}"
    max_connections: 20
    timeout_seconds: 60
    parameters:
      # ClickHouse will use ROW_NUMBER() OVER to find latest row per entity
      # at the specified timestamp
      chunk_size: 5000  # Smaller chunks for complex temporal queries
