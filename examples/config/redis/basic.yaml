server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 30

registry:
  type: static
  views:
    - name: session_features
      entity_type: session
      entity_key: session_id
      columns:
        - name: active_user_id
          arrow_type: string
          source: redis_adapter
        - name: request_count
          arrow_type: int64
          source: redis_adapter
        - name: last_activity
          arrow_type: timestamp
          source: redis_adapter

adapters:
  redis_adapter:
    type: redis
    connection: "redis://localhost:6379/0"
    source_path: "sessions:{entity}"
    parameters:
      mget_chunk_size: 1000
