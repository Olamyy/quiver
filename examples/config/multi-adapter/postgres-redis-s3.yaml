server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 30

registry:
  type: static
  views:
    - name: ecommerce_features
      entity_type: user
      entity_key: user_id
      columns:
        - name: spend_30d
          arrow_type: float64
          source: postgres_transactional
        - name: purchase_count
          arrow_type: int64
          source: postgres_transactional
        - name: last_purchase_date
          arrow_type: timestamp
          source: s3_data_lake
        - name: is_premium
          arrow_type: bool
          source: redis_cache

    - name: session_features
      entity_type: session
      entity_key: session_id
      columns:
        - name: active_user_id
          arrow_type: string
          source: redis_cache
        - name: request_count
          arrow_type: int64
          source: redis_cache
        - name: last_activity
          arrow_type: timestamp
          source: redis_cache

adapters:
  postgres_transactional:
    type: postgres
    connection_string: "postgresql://quiver:${POSTGRES_PASSWORD}@localhost:5432/quiver_test"
    source_path: "ecommerce_data"
    max_connections: 10
    timeout_seconds: 30

  redis_cache:
    type: redis
    connection: "redis://localhost:6379/0"
    source_path: "{entity_type}:{entity}"
    parameters:
      mget_chunk_size: 5000

  s3_data_lake:
    type: s3_parquet
    storage_uri: "s3://${AWS_BUCKET}/features"
    source_path: "{feature}.parquet"
    timeout_seconds: 30
    auth:
      region: "${AWS_REGION}"
      access_key_id: "${AWS_ACCESS_KEY_ID}"
      secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
