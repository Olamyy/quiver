server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 30

registry:
  type: static
  views:
    - name: ecommerce_features
      entity_type: user
      entity_key: user_id
      columns:
        - name: spend_30d
          arrow_type: float64
          source: postgres_historical
        - name: purchase_count
          arrow_type: int64
          source: postgres_historical
        - name: last_purchase_date
          arrow_type: timestamp
          source: postgres_historical
        - name: is_premium
          arrow_type: bool
          source: clickhouse_historical

    - name: session_features
      entity_type: session
      entity_key: session_id
      columns:
        - name: active_user_id
          arrow_type: string
          source: redis_realtime
        - name: request_count
          arrow_type: int64
          source: redis_realtime
        - name: last_activity
          arrow_type: timestamp
          source: redis_realtime

    - name: timeseries_features
      entity_type: sensor
      entity_key: sensor_id
      columns:
        - name: temperature
          arrow_type: float64
          source: clickhouse_historical
        - name: humidity
          arrow_type: float64
          source: clickhouse_historical
        - name: alert_triggered
          arrow_type: bool
          source: clickhouse_historical

adapters:
  postgres_historical:
    type: postgres
    connection_string: "postgresql://quiver:${POSTGRES_PASSWORD}@localhost:5432/quiver_test"
    source_path: "ecommerce_data"
    max_connections: 10
    timeout_seconds: 30

  redis_realtime:
    type: redis
    connection: "redis://localhost:6379/0"
    source_path: "{entity_type}:{entity}"
    parameters:
      mget_chunk_size: 5000

  clickhouse_historical:
    type: clickhouse
    connection_string: "clickhouse://default@localhost:9000/quiver_test"
    source_path: "{feature}"
    max_connections: 10
    timeout_seconds: 30
