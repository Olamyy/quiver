server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 30
  observability:
    ttl_seconds: 3600
    max_entries: 10000

registry:
  type: static
  views:
    - name: ecommerce_features
      entity_type: user
      entity_key: entity
      columns:
        - name: spend_30d
          arrow_type: float64
          source: postgres_historical
          source_path: "ecommerce_data"
        - name: purchase_count
          arrow_type: int64
          source: postgres_historical
          source_path: "ecommerce_data"
        - name: is_premium
          arrow_type: bool
          source: s3_data_lake
          source_path: "is_premium.parquet"

    - name: session_features
      entity_type: session
      entity_key: entity
      columns:
        - name: active_user_id
          arrow_type: string
          source: redis_realtime
        - name: request_count
          arrow_type: int64
          source: redis_realtime
        - name: last_activity
          arrow_type: timestamp
          source: redis_realtime

adapters:
  postgres_historical:
    type: postgres
    connection_string: "postgresql://quiver:${POSTGRES_PASSWORD}@localhost:5432/quiver_test"
    source_path: "ecommerce_data"
    max_connections: 10
    timeout_seconds: 30

  redis_realtime:
    type: redis
    connection: "redis://localhost:6379/0"
    source_path: "{entity}"
    parameters:
      mget_chunk_size: 5000

  s3_data_lake:
    type: s3parquet
    storage_uri: "file:///tmp/quiver_test_data"
    source_path: "features/{feature}.parquet"
    timeout_seconds: 30

