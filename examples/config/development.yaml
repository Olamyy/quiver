# Development configuration for local testing
# Simplified setup for developers to get started quickly

server:
  host: "127.0.0.1"
  port: 8815
  
  # Development-friendly settings
  max_concurrent_rpcs: 100
  max_message_size_mb: 16
  timeout_seconds: 30
  
  # Detailed logging for debugging
  access_log:
    enabled: true
    format: "json"
    include_request_body: true
    include_response_metadata: true

registry:
  type: static
  views:
    - name: "dev_user_features"
      entity_type: "user"
      entity_key: "user_id"
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "dev_postgres"
        
        - name: "test_score"
          arrow_type: "float64"
          nullable: true
          source: "dev_postgres"
        
        - name: "test_category"
          arrow_type: "string"
          nullable: true
          source: "dev_postgres"
    
    - name: "dev_realtime_features"
      entity_type: "user" 
      entity_key: "user_id"
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "dev_redis"
        
        - name: "session_count"
          arrow_type: "int64"
          nullable: true
          source: "dev_redis"

# Development adapters with relaxed security for local testing
adapters:
  dev_postgres:
    type: postgres
    # Local PostgreSQL without TLS requirement
    connection_string: "postgresql://dev_user:dev_password@localhost:5432/quiver_dev?sslmode=prefer"
    table_template: "dev_features_{feature}"
    max_connections: 5
    timeout_seconds: 10
  
  dev_redis:
    type: redis
    # Local Redis without TLS
    connection: "redis://localhost:6379"
    key_template: "dev:{entity}:{feature}"
    # No password for local development