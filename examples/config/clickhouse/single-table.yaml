server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 30

registry:
  type: static
  views:
    - name: ecommerce_features
      entity_type: user
      entity_key: user_id
      columns:
        - name: spend_30d
          arrow_type: float64
          source: clickhouse_adapter
        - name: purchase_count
          arrow_type: int64
          source: clickhouse_adapter
        - name: last_purchase_date
          arrow_type: timestamp
          source: clickhouse_adapter
        - name: is_premium
          arrow_type: bool
          source: clickhouse_adapter

adapters:
  clickhouse_adapter:
    type: clickhouse
    connection_string: "clickhouse://default@localhost:9000/quiver_test"
    source_path: "features"
    max_connections: 10
    timeout_seconds: 30
