server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 30

registry:
  type: static
  views:
    - name: timeseries_features
      entity_type: sensor
      entity_key: sensor_id
      columns:
        - name: temperature
          arrow_type: float64
          source: clickhouse_adapter
        - name: humidity
          arrow_type: float64
          source: clickhouse_adapter
        - name: alert_triggered
          arrow_type: bool
          source: clickhouse_adapter

adapters:
  clickhouse_adapter:
    type: clickhouse
    connection_string: "clickhouse://default@localhost:9000/quiver_test"
    source_path: "timeseries_data"
    max_connections: 10
    timeout_seconds: 30
