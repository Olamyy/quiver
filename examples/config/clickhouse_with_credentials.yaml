# ClickHouse adapter - with explicit credentials
#
# This configuration demonstrates using environment variables for credentials:
# - Credentials injected at runtime via environment variables
# - Recommended for production deployments
# - TLS configuration for secure connections
# - Health check integration

server:
  host: 0.0.0.0
  port: 8815
  timeout_seconds: 30
  # Optional TLS for server
  # tls:
  #   cert_path: "/etc/quiver/cert.pem"
  #   key_path: "/etc/quiver/key.pem"

registry:
  type: static
  views:
    - name: user_features
      entity_type: user
      entity_key: user_id
      columns:
        - name: spend_30d
          arrow_type: float64
          source: clickhouse_secure
        - name: last_purchase
          arrow_type: timestamp
          source: clickhouse_secure
        - name: active
          arrow_type: boolean
          source: clickhouse_secure

adapters:
  clickhouse_secure:
    type: clickhouse
    # Connection string with credentials from environment:
    # CLICKHOUSE_USER=myuser
    # CLICKHOUSE_PASSWORD=mypassword
    # CLICKHOUSE_HOST=ch.example.com
    # CLICKHOUSE_PORT=9000
    connection_string: "${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@${CLICKHOUSE_HOST}:${CLICKHOUSE_PORT}/feature_store"
    source_path: "features_{feature}"
    max_connections: 25
    timeout_seconds: 45
    # Optional TLS configuration for adapter connections
    tls:
      verify_certificates: true
      ca_cert_path: "/etc/quiver/clickhouse-ca.pem"
    parameters:
      chunk_size: 10000
