# S3/Parquet Adapter Configuration - Basic Example
# Simple setup for single Parquet file per feature
# Suitable for batch feature storage in S3

server:
  host: "0.0.0.0"
  port: 8815
  max_concurrent_rpcs: 1000
  max_message_size_mb: 128
  timeout_seconds: 30
  compression: gzip

  access_log:
    enabled: true
    format: "json"
    include_request_body: false
    include_response_metadata: true

registry:
  type: static
  views:
    - name: "batch_user_features"
      entity_type: "user"
      entity_key: "user_id"
      columns:
        - name: "user_id"
          arrow_type: "string"
          nullable: false
          source: "s3_parquet_adapter"

        - name: "age"
          arrow_type: "int64"
          nullable: true
          source: "s3_parquet_adapter"

        - name: "lifetime_spend"
          arrow_type: "float64"
          nullable: true
          source: "s3_parquet_adapter"

        - name: "account_created"
          arrow_type: "timestamp"
          nullable: false
          source: "s3_parquet_adapter"

        - name: "is_vip"
          arrow_type: "bool"
          nullable: true
          source: "s3_parquet_adapter"

adapters:
  s3_parquet_adapter:
    type: s3parquet
    storage_uri: "s3://airflow-ml-platform-test"
    source_path: "/features/{feature}.parquet"
    timeout_seconds: 30
    max_days_back: 365
