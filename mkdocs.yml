site_name: Quiver
site_description: Arrow-native feature serving for ML inference
site_url: https://olamyy.github.io/quiver
repo_url: https://github.com/Olamyy/quiver
repo_name: Olamyy/quiver
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/home.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [quiver-python]
          options:
            show_source: false
            show_root_heading: true
            docstring_style: google

nav:
  - Home: index.md

  - Getting Started:
    - Introduction: getting-started/introduction.md
    - Quickstart: getting-started/quickstart.md
    - Installation: getting-started/installation.md

  - Concepts:
    - Architecture: concepts/architecture.md
    - Configuration: concepts/configuration.md
    - Feature Views: concepts/feature-views.md
    - Temporal Queries: concepts/temporal-queries.md
    - Fanout: concepts/fanout.md

  - Guides:
    - Docker: guides/docker.md
    - Kubernetes Sidecar: guides/kubernetes-sidecar.md
    - Multi-Backend: guides/multi-backend.md

  - Reference:
    - Configuration: reference/configuration.md
    - Python Client: reference/python-client.md
