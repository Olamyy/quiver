name: Python CI

on:
  push:
    branches: [main, develop]
    paths:
      - "quiver-python/**"
      - "proto/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "quiver-python/**"
      - "proto/**"
      - ".github/workflows/python-ci.yml"

jobs:
  quality:
    name: Python Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            quiver-python/.venv
          key: ${{ runner.os }}-python-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install Python dependencies
        run: make install-py

      - name: Check Python formatting
        run: |
          cd quiver-python && uv run ruff format --check

      - name: Lint Python code
        run: make lint-py

  test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            quiver-python/.venv
          key: ${{ runner.os }}-python-test-${{ hashFiles('**/uv.lock') }}

      - name: Install dependencies and run tests
        run: make pytest