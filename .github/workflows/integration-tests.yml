name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            quiver-core/target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust server
        working-directory: ./quiver-core
        run: cargo build --release

      - name: Start Quiver server
        working-directory: ./quiver-core
        run: |
          ./target/release/quiver-core &
          echo $! > /tmp/quiver.pid
          sleep 5

      - name: Install grpcurl
        run: |
          curl -sSL "https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz" | tar -xz
          sudo mv grpcurl /usr/local/bin/

      - name: Test gRPC endpoints
        run: |
          # Check health
          grpcurl -plaintext localhost:8815 grpc.health.v1.Health/Check
          
          # List services
          grpcurl -plaintext localhost:8815 list
          
          # Get schema
          grpcurl -plaintext -d '{"path": ["my_feature_view"]}' \
            localhost:8815 arrow.flight.protocol.FlightService/GetSchema

      - name: Install Python client
        working-directory: ./quiver-python
        run: uv pip install --system -e .

      - name: Test Python client
        working-directory: ./quiver-python
        run: |
          python -c "from client import QuiverClient; print('Python client import successful')"

      - name: Stop Quiver server
        if: always()
        run: |
          if [ -f /tmp/quiver.pid ]; then
            kill $(cat /tmp/quiver.pid) || true
          fi

