name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            quiver-core/target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust server
        working-directory: ./quiver-core
        run: cargo build --release

      - name: Start Quiver server
        working-directory: ./quiver-core
        run: |
          ./target/release/quiver-core &
          echo $! > /tmp/quiver.pid
          sleep 5

      - name: Install Python client
        working-directory: ./quiver-python
        run: uv pip install --system -e .

      - name: Test Python client
        working-directory: ./quiver-python
        run: |
          python -c "from client import QuiverClient; print('Python client import successful')"

      - name: Stop Quiver server
        if: always()
        run: |
          if [ -f /tmp/quiver.pid ]; then
            kill $(cat /tmp/quiver.pid) || true
          fi
